name: robomimic

args: []
kwargs:
  camera_names:
    - agentview
  proprio_keys:
    - robot0_eef_pos
    - robot0_eef_quat
    - robot0_gripper_qwidth
  img_size: [224, 224]
  render_offscreen: true

dataset:
  _target_: "robomimic_code.dino_datasets.robomimic_dset.load_robomimic_slice_train_val"

  data_path: ${oc.env:DATASET_DIR}/robomimic/lift/complete.hdf5

  camera_names:
    - agentview

  proprio_keys:
    - robot0_eef_pos
    - robot0_eef_quat
    - robot0_gripper_qwidth

  normalize_action: ${normalize_action}

  transform:
    _target_: "dino_datasets.img_transforms.default_transform"
    img_size: ${img_size}

decoder_path: null
num_workers: 8
